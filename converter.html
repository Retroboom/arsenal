<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoW → HoF Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg: #0f0e0c; --bg2: #1a1916; --bg3: #242220;
    --border: #333028; --accent: #e0c060;
    --text: #f5f0e0; --text2: #d0c8b0; --text3: #b0a490;
    --mono: 'Share Tech Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); padding: 32px; max-width: 920px; margin: 0 auto; }

  h1 { font-size: 13px; letter-spacing: 3px; color: var(--accent); margin-bottom: 28px; padding-bottom: 14px; border-bottom: 1px solid var(--border); text-transform: uppercase; }

  input[type=file] { display: none; }
  .file-label { display: inline-block; border: 1px solid var(--accent); color: var(--accent); font-family: var(--mono); font-size: 10px; letter-spacing: 1px; padding: 6px 14px; cursor: pointer; text-transform: uppercase; }
  .file-label:hover { background: rgba(224,192,96,0.08); }
  .status { font-size: 10px; color: var(--text3); margin-left: 14px; }

  .meta { font-size: 10px; color: var(--text3); margin: 18px 0 10px; }
  .meta strong { color: var(--accent); }

  button { background: none; border: 1px solid var(--border); color: var(--text2); font-family: var(--mono); font-size: 10px; letter-spacing: 1px; padding: 5px 13px; cursor: pointer; text-transform: uppercase; transition: border-color 0.12s, color 0.12s; }
  button:hover { border-color: var(--accent); color: var(--accent); }
  .btn-accent { border-color: var(--accent); color: var(--accent); }
  .btn-accent:hover { background: rgba(224,192,96,0.1); }

  pre { background: var(--bg2); border: 1px solid var(--border); padding: 14px; font-size: 10px; color: #9adb9a; overflow-x: auto; white-space: pre-wrap; line-height: 1.6; max-height: 70vh; overflow-y: auto; margin-top: 10px; }
</style>
</head>
<body>

<h1>Flames of War → Hail of Fire Converter</h1>

<div>
  <label class="file-label" for="pdf-upload">Upload FoW PDF</label>
  <input type="file" id="pdf-upload" accept=".pdf" onchange="loadPDF(this)">
  <span class="status" id="pdf-status"></span>
</div>

<div id="output-section" style="display:none">
  <div class="meta"><strong id="detected-count">0</strong> units detected &nbsp;<span style="color:var(--text3);font-size:9px">[build 3]</span></div>
  <button class="btn-accent" onclick="copyExport()">Copy JSON</button>
  <pre id="export-output"></pre>
</div>

<script>
if (typeof pdfjsLib !== 'undefined') {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

let _pdfDoc = null;

async function loadPDF(input) {
  if (!input.files[0]) return;
  const status = document.getElementById('pdf-status');
  status.textContent = 'Loading…';
  document.getElementById('output-section').style.display = 'none';
  try {
    const buf = await input.files[0].arrayBuffer();
    _pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;
    status.textContent = `Scanning all ${_pdfDoc.numPages} pages…`;
    await reparse();
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
  }
}

async function reparse() {
  if (!_pdfDoc) return;
  const status = document.getElementById('pdf-status');
  let fullText = '';
  for (let i = 1; i <= _pdfDoc.numPages; i++) {
    const page = await _pdfDoc.getPage(i);
    const content = await page.getTextContent();
    const lineMap = new Map();
    for (const item of content.items) {
      const y = Math.round(item.transform[5] / 2) * 2;
      lineMap.set(y, (lineMap.get(y) ? lineMap.get(y) + ' ' : '') + item.str);
    }
    const sortedLines = [...lineMap.entries()]
      .sort((a, b) => b[0] - a[0])
      .map(([, text]) => text.trim())
      .filter(Boolean);
    fullText += sortedLines.join('\n') + '\n\n';
    if (i % 20 === 0) status.textContent = `Scanning… ${i}/${_pdfDoc.numPages} pages`;
  }
  status.textContent = `${_pdfDoc.numPages} pages scanned`;
  detectAllUnits(fullText);
}

// ── Unit Block Detection ──────────────────────────────────────────────────────

const QUALITIES = [
  'Fearless Veteran','Confident Veteran','Fearless Trained',
  'Confident Trained','Reluctant Veteran','Confident Conscript','Reluctant Conscript',
];

const TANK_MOB = ['Fully-tracked','Half-tracked','Wheeled','Foot','Horse-drawn','Tracked','Jeep'];
const GUN_MOB  = ['Man-packed','Light','Medium','Heavy','Immobile','Self-propelled'];

const RANGE_RE = /(\d+)[""″\u201c\u201d\u2033]\/\d+\s*cm/i;

// FoW text → HoF rule name mappings (more specific phrases before general ones)
const FOW_TO_HOF_RULES = [
  // Portability
  { re: /\bman[- ]?pack(?:ed)?\b/i,               rule: 'Man-Portable'      },
  // Vehicle traits — compound phrases before single words
  { re: /\bvery\s+fast\b/i,                        rule: 'Fast'              },
  { re: /\bvery\s+slow\b/i,                        rule: 'Slow'              },
  { re: /\bslow\s+tank\b/i,                        rule: 'Slow'              },
  { re: /\bhull[- ]?mount(?:ed)?\b/i,              rule: 'Hull Mounted'      },
  { re: /\bopen[- ]?top(?:ped)?\b/i,               rule: 'Open Topped'       },
  { re: /\bwide\s+tracks?\b/i,                     rule: 'Wide Tracks'       },
  { re: /\bunreliable\b/i,                         rule: 'Unreliable'        },
  { re: /\bfast\b/i,                               rule: 'Fast'              },
  { re: /\bslow\b/i,                               rule: 'Slow'              },
  { re: /\bimmobile\b/i,                           rule: 'Immobile'          },
  { re: /\boverloaded\b/i,                         rule: 'Overloaded'        },
  { re: /\bamphibious\b/i,                         rule: 'Amphibious'        },
  // Weapons / fire modes
  { re: /\bsmoke\s+bombardment\b/i,                rule: 'Smoke'             },
  { re: /\bsmoke\b/i,                              rule: 'Smoke'             },
  { re: /\bflame[- ]?thrower\b/i,                  rule: 'Flame-Thrower'     },
  { re: /\bbunker[- ]?buster\b/i,                  rule: 'Bunker Buster'     },
  { re: /\blimited\s+he\b/i,                       rule: 'Limited HE'        },
  { re: /\blight\s+mortar\b/i,                     rule: 'Light Mortar'      },
  { re: /\banti[- ]?aircraft\b/i,                  rule: 'Anti-Air'          },
  // Artillery classifications
  { re: /\bheavy\s+artillery\b/i,                  rule: 'Heavy Artillery'   },
  { re: /\bmedium\s+artillery\b/i,                 rule: 'Medium Artillery'  },
  { re: /\blight\s+artillery\b/i,                  rule: 'Light Artillery'   },
  // Transport capacity
  { re: /\bcarri(?:es|ed?)\s+4\s+teams?\b/i,       rule: 'Carries 4 Teams'   },
  { re: /\bcarri(?:es|ed?)\s+3\s+teams?\b/i,       rule: 'Carries 3 Teams'   },
  { re: /\bcarri(?:es|ed?)\s+2\s+teams?\b/i,       rule: 'Carries 2 Teams'   },
  { re: /\bcarri(?:es|ed?)\s+1\s+team\b/i,         rule: 'Carries 1 Team'    },
  { re: /\bcarry\s+4\b/i,                           rule: 'Carries 4 Teams'   },
  { re: /\bcarry\s+3\b/i,                           rule: 'Carries 3 Teams'   },
  { re: /\bcarry\s+2\b/i,                           rule: 'Carries 2 Teams'   },
  { re: /\bcarry\s+1\b/i,                           rule: 'Carries 1 Team'    },
  { re: /\bpassenger[- ]?fired\b/i,                 rule: 'Passenger-fired MG'},
];

// FoW-only terms with no HoF equivalent — strip silently
const FOW_DISCARD = [
  // Vehicle descriptions / layout notes
  /\bawkward\s+layout\b/i,
  /\bhmg\s+carrier\b/i,
  /\brecovery\s+vehicle\b/i,
  /\btwo[- ]?deck\s+turret\b/i,
  /\btwo\s+optional\b/i,
  /\bturret\s+front\b/i,
  /\bgun\s+shield\b/i,
  /\bprotected\s+ammo(?:unition)?\b/i,
  /\bturntable\b/i,
  /\bspaced\s+armou?r\b/i,
  /\bhull[- ]?down\b/i,
  // FoW-specific special rules
  /\bhen\s+and\s+chicks?\b/i,
  /\bstabiliz(?:er|ed)\b/i,
  /\bgyro[\s-]?stabilis(?:er|or|ed)\b/i,
  /\bsemi[- ]indirect\s+fire\b/i,
  /\bcautious\s+movement\b/i,
  /\bvolley\s+fire\b/i,
  /\bshoots?\s+(?:and|&)\s+scoots?\b/i,
  /\blaser\s+rangefinder\b/i,
  /\btank\s+escorts?\b/i,
  /\btruscott\s+trot\b/i,
  /\bwarrior\b/i,
  /\bmission\s+tactics?\b/i,
  /\btank(?:hunter)?s?\s+(?:last\s+stand|rule)\b/i,
  /\blast\s+stand\b/i,
  /\btiger\s+fear\b/i,
  /\bstormtroopers?\b/i,
  /\brecce\b/i,
  /\bexcellent\s+eyes?\b/i,
  /\bclever\s+hans?\b/i,
  /\breinforced\s+tracks?\b/i,
  /\bmountaineers?\b/i,
  /\bpioneer\b/i,
  /\btankhunters?\b/i,
  /\brof\s+\d+\b/i,
  /\bif\s+(?:stationary|moving)\b/i,
  /\bpassengers?\b/i,
  // Stray single words left after compound-phrase extraction above
  /\btanks?\b/i,
  /\bvery\b/i,
  /\baa\b/i,
];

const SECTION_MAP = {
  'TANK TEAMS': 'tank', 'TRANSPORT TEAMS': 'tank', 'ARMOURED CARS': 'tank',
  'GUN TEAMS': 'gun', 'VEHICLE MACHINE': 'gun', 'BUNKERS': 'gun',
  'INFANTRY TEAMS': 'infantry', 'CAVALRY': 'tank', 'COMBAT TANKS': 'tank',
  'TANK-HUNTERS': 'tank', 'SELF-PROPELLED': 'tank',
};

const NATION_MAP = [
  { keywords: ['FRENCH','FRANCE','ARMÉE'],          nation: 'France'       },
  { keywords: ['POLISH','POLAND'],                   nation: 'Poland'       },
  { keywords: ['GERMAN','GERMANY','HEER','PANZER','LUFTWAFFE','WAFFEN'], nation: 'Germany'  },
  { keywords: ['BRITISH','BRITAIN','BEF','ROYAL TANK','COMMONWEALTH'],   nation: 'Britain'  },
  { keywords: ['SOVIET','USSR','RED ARMY'],          nation: 'Soviet Union' },
  { keywords: ['AMERICAN','US ARMY','USA'],          nation: 'United States'},
  { keywords: ['ITALIAN','ITALY'],                   nation: 'Italy'        },
  { keywords: ['BELGIAN','BELGIUM'],                 nation: 'Belgium'      },
];

const NAME_NATION_MAP = [
  { patterns: [
    /^renault/i, /^char\s+b/i, /^hotchkiss/i, /^somua/i, /^panhard/i,
    /^laffly/i, /^lorraine/i, /^autocanon/i, /^gnome.rh[oô]ne/i, /^citro[eë]n/i,
    /^vb\s+team/i, /\bmle[.\s]+1[89]\d\d\b/i, /\bmle\s*3[0-9]\b/i,
    /\bsa[-\s]3[4-9]\b/i, /^25mm\s+sa/i, /^47mm\s+sa/i,
  ], nation: 'France' },
  { patterns: [/^7tp/i, /^tks\b/i, /^wz\.\s*\d/i, /^vickers\s+e/i, /^ft-17/i], nation: 'Poland' },
  { patterns: [/^t-\d+/i, /^bt-\d+/i, /^ba-\d+/i, /^kv-\d+/i, /^su-\d+/i], nation: 'Soviet Union' },
];

function detectNation(line) {
  const up = line.toUpperCase();
  if (RANGE_RE.test(line) || line.length > 100) return null;
  for (const { keywords, nation } of NATION_MAP) {
    if (keywords.some(k => up.includes(k))) return nation;
  }
  return null;
}

function nationFromUnitName(name) {
  for (const { patterns, nation } of NAME_NATION_MAP) {
    if (patterns.some(re => re.test(name))) return nation;
  }
  return null;
}

function detectSection(line) {
  const up = line.toUpperCase();
  for (const [key, val] of Object.entries(SECTION_MAP)) {
    if (up.includes(key)) return val;
  }
  return null;
}

function parseRangeRow(line) {
  const DASH = '[-\u2013\u2014]';
  const Q    = '[""″\u201c\u201d\u2033]';
  let rm = line.match(
    new RegExp(`(\\d+)${Q}\\/\\d+\\s*cm\\s+(${DASH}|\\d+)(?:\\/\\d+)?\\s+(${DASH}|\\d+)\\s+(${DASH}|\\d+\\+)\\s*(.*)?$`, 'i')
  );
  if (!rm) {
    rm = line.match(
      new RegExp(`(\\d+)${Q}\\s+(${DASH}|\\d+)(?:\\/\\d+)?\\s+(${DASH}|\\d+)\\s+(${DASH}|\\d+\\+)\\s*(.*)?$`, 'i')
    );
  }
  if (!rm) return null;
  const isDash = v => /^[-\u2013\u2014]$/.test(v);
  return {
    range:  rm[1],
    rof:    isDash(rm[2]) ? '' : rm[2].split('/')[0],
    at:     isDash(rm[3]) ? '' : rm[3],
    fp:     isDash(rm[4]) ? '' : rm[4],
    notes:  rm[5] || '',
  };
}

function makeWeapon(name, stats, unitNotes) {
  const un = unitNotes || '';
  return {
    weaponName: name,
    range:   stats.range,
    rof:     stats.rof,
    at:      stats.at,
    fp:      stats.fp,
    bombard: false,
    smoke:   /smoke/i.test(stats.notes) || /smoke/i.test(un),
    coax:    /co.?ax/i.test(name),
    hull:    /hull\s*(mg)?/i.test(name),
  };
}

function detectAllUnits(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  let currentQuality = null;
  let currentNation  = null;
  let sectionType = 'tank';
  const units = [];
  let cur = null;
  let pendingWeapon = null;

  for (const line of lines) {
    const nat = detectNation(line);
    if (nat) { currentNation = nat; }

    const sec = detectSection(line);
    if (sec) { sectionType = sec; cur = null; pendingWeapon = null; continue; }

    for (const q of QUALITIES) {
      if (line.includes(q)) { currentQuality = q; break; }
    }

    if (sectionType === 'tank') {
      if (/^firing\s+bombardment/i.test(line)) {
        const stats = parseRangeRow(line);
        if (stats && cur) {
          const w = makeWeapon('Firing Bombardment', stats, '');
          w.bombard = true; w.range = null;
          cur.weapons.push(w);
        }
        continue;
      }

      const hasTankMob = TANK_MOB.some(m => line.includes(m));
      const rangePos = line.search(/\d+[""″\u201c\u201d\u2033]/);
      const hasGunMobBeforeRange = rangePos > -1 && GUN_MOB.some(m => line.slice(0, rangePos).includes(m));
      if (!hasTankMob && !hasGunMobBeforeRange && RANGE_RE.test(line)) {
        const nameM = line.match(/^(.+?)\s+\d+[""″\u201c\u201d\u2033]/);
        const wname = nameM ? nameM[1].trim() : line;
        const stats = parseRangeRow(line);
        if (stats) {
          if (cur && cur.weapons.length === 0) {
            cur.weapons.push(makeWeapon(wname, stats, cur.unitNotes));
          } else if (!cur) {
            pendingWeapon = { wname, stats };
          }
        }
        continue;
      }

      for (const mob of TANK_MOB) {
        const idx = line.indexOf(mob);
        if (idx === -1) continue;
        const beforeMob = line.slice(0, idx).trim();
        const PROSE = ['move as', 'move like', ' are ', 'can be', ' using ', 'teams move',
                       ' to the ', ' with the ', 'infantry teams', 'all other',
                       'is removed', 'as if a', 'obstacle', 'had been'];
        const isNarrative = beforeMob.length > 52 ||
          PROSE.some(p => beforeMob.toLowerCase().includes(p)) ||
          /\s(the|of|as|in|at|by|from|with|for)(\s|$)/i.test(beforeMob);
        if (isNarrative || beforeMob.length < 2) break;
        if (/\s\(\d+\s*$/.test(beforeMob)) break;

        const afterMob  = line.slice(idx + mob.length).trim();
        const sm = afterMob.match(/^(-|\d+)\s+(-|\d+)\s+(-|\d+)\s*(.*)?$/);
        const nameNation = nationFromUnitName(beforeMob);
        cur = {
          unitName:   beforeMob,
          mobility:   mob,
          armorFront: sm ? (sm[1] === '-' ? '' : sm[1]) : '',
          armorSide:  sm ? (sm[2] === '-' ? '' : sm[2]) : '',
          unitNotes:  sm ? (sm[4] || '') : afterMob,
          quality:    currentQuality,
          nation:     nameNation || currentNation,
          weapons:    [],
        };
        if (pendingWeapon) {
          cur.weapons.push(makeWeapon(pendingWeapon.wname, pendingWeapon.stats, cur.unitNotes));
          pendingWeapon = null;
        }
        units.push(cur);
        break;
      }
      continue;
    }

    if (sectionType === 'gun') {
      if (/^firing\s+bombardment/i.test(line)) {
        const stats = parseRangeRow(line);
        if (stats && cur && cur.weapons.length > 0) {
          const w = makeWeapon('Firing Bombardment', stats, '');
          w.bombard = true; w.range = null;
          cur.weapons.push(w);
        }
        continue;
      }
      for (const mob of GUN_MOB) {
        const idx = line.indexOf(mob);
        if (idx === -1) continue;
        const unitName = line.slice(0, idx).trim();
        if (unitName.length < 2 || unitName.length > 60) break;
        const afterMob = line.slice(idx + mob.length).trim();
        const stats = parseRangeRow(afterMob.length ? afterMob : line);
        if (!stats) break;
        const nameNation = nationFromUnitName(unitName);
        cur = { unitName, mobility: mob, armorFront: '', armorSide: '', unitNotes: stats.notes, quality: currentQuality, nation: nameNation || currentNation, weapons: [] };
        cur.weapons.push(makeWeapon(unitName, stats, stats.notes));
        units.push(cur);
        break;
      }
      continue;
    }

    if (sectionType === 'infantry') {
      if (!RANGE_RE.test(line)) continue;
      const nameM = line.match(/^(.+?)\s+\d+[""″\u201c\u201d\u2033]/);
      const unitName = nameM ? nameM[1].trim() : '';
      if (unitName.length < 2 || unitName.length > 60) continue;
      if (/\s(to|the|and|or|of|as|in|at|by|from|with|for)(\s|$)/i.test(unitName)) continue;
      if (/\(?\d+\s*(st|nd|rd|th)\b/i.test(unitName)) continue;
      if (/\s\(\d+\s*$/.test(unitName)) continue;
      const stats = parseRangeRow(line);
      if (!stats) continue;
      const nameNation = nationFromUnitName(unitName);
      cur = { unitName, mobility: '', armorFront: '', armorSide: '', unitNotes: stats.notes, quality: currentQuality, nation: nameNation || currentNation, weapons: [] };
      cur.weapons.push(makeWeapon(unitName, stats, stats.notes));
      units.push(cur);
    }
  }

  const seen = new Set();
  const valid = units.filter(u => {
    if (!u.unitName || u.unitName.length <= 1) return false;
    const key = `${u.nation || ''}|${u.unitName.toLowerCase()}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  document.getElementById('detected-count').textContent = valid.length;
  window._detectedUnits = valid;
  exportAll(valid);
}

// ── Conversion ────────────────────────────────────────────────────────────────

function cvtAT(v) { const n = parseInt(v); return (isNaN(n)||v==='') ? null : Math.max(0, Math.ceil(n/2)-1); }

function cvtRange(name, v, bombard) {
  if (bombard) return null;
  const lc = (name||'').toLowerCase();
  if (lc.includes('bazooka')) return '6"';
  if (lc.includes('panzerschreck')||lc.includes('schreck')) return '8"';
  const r = parseInt(v);
  if (isNaN(r)||v==='') return null;
  if (r <= 16) return `${r}"`;
  if (r === 24) return '20"';
  if (r === 32) return '24"';
  return `${Math.round(r * 0.75 / 2) * 2}"`;
}

function cvtROF(v) { const n = parseInt(v); return (isNaN(n)||v==='') ? null : (n >= 4 ? n-1 : n); }

function cvtFP(v) {
  if (!v) return null;
  const n = parseInt(v);
  if (isNaN(n)) return null;
  return n <= 1 ? 3 : n === 2 ? 2 : 1;
}

function cvtQuality(v) {
  if (v === 'Fearless Veteran') return 'Elite';
  if (v === 'Reluctant Conscript') return 'Poor';
  return 'Regular';
}

function makeId(nation, name) {
  const map = { 'United States':'us','Germany':'de','Britain':'br','Soviet Union':'sov','Canada':'ca','France':'fr','Italy':'it','Japan':'jp','Poland':'pl','Belgium':'be' };
  const prefix = map[nation] || 'xx';
  const slug = (name||'unit').toLowerCase().replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-');
  return `${prefix}-${slug}`;
}

function exportAll(units) {
  const years = [1939,1940,1941,1942,1943,1944,1945];

  const result = units.map(u => {
    const nation  = u.nation  || 'Unknown';
    const fowQ    = u.quality || 'Confident Veteran';

    const armorFront = u.armorFront !== '' ? cvtAT(u.armorFront) : null;
    const armorFlank = u.armorSide  !== '' ? cvtAT(u.armorSide)  : null;

    const main = u.weapons.filter(w => !w.coax && !w.hull && !w.bombard);
    let gunRange = null, rof = null, at = null, fp = null;
    const notes = [];

    if (main.length > 0) {
      const w = main[0];
      gunRange = cvtRange(w.weaponName, w.range, w.bombard);
      rof      = cvtROF(w.rof);
      at       = cvtAT(w.at);
      fp       = cvtFP(w.fp);
      if (w.smoke) notes.push('Smoke');
    }
    main.slice(1).forEach(w => {
      const parts = [w.weaponName];
      const r = cvtRange(w.weaponName, w.range, w.bombard);
      const rf = cvtROF(w.rof); const a = cvtAT(w.at); const f = cvtFP(w.fp);
      if (r!==null) parts.push(r); if (rf!==null) parts.push(`ROF ${rf}`);
      if (a!==null) parts.push(`AT ${a}`); if (f!==null) parts.push(`FP: ${f}`);
      if (w.smoke) parts.push('Smoke');
      notes.push(parts.filter(Boolean).join(' '));
    });

    if (u.mobility === 'Fully-tracked') notes.push('Tracked');
    else if (u.mobility === 'Half-tracked') notes.push('Half-Tracked');
    else if (u.mobility === 'Horse-drawn') notes.push('Horse-drawn');
    if (u.mobility === 'Immobile'   && !notes.includes('Immobile'))    notes.push('Immobile');
    if (u.mobility === 'Man-packed' && !notes.includes('Man-Portable')) notes.push('Man-Portable');

    // Extract HoF rules from unitNotes; discard FoW-only terms; remainder = armament
    let notesRemainder = u.unitNotes || '';
    for (const { re, rule } of FOW_TO_HOF_RULES) {
      if (re.test(notesRemainder) && !notes.includes(rule)) {
        notes.push(rule);
      }
      notesRemainder = notesRemainder.replace(re, ' ');
    }
    for (const re of FOW_DISCARD) {
      notesRemainder = notesRemainder.replace(re, ' ');
    }
    // Normalize Co-ax → Coax for cleaner armament display
    notesRemainder = notesRemainder
      .replace(/\bco[- ]?ax\b/gi, 'Coax')
      .replace(/\d+\s*points?/gi, '')
      .replace(/[,;.]+/g, ' ')
      .replace(/\s{2,}/g, ' ')
      .trim();

    let unitType = 'Infantry';
    let unitBase = 'Medium';
    if (armorFront !== null) {
      unitType = 'Armored'; unitBase = 'Vehicle';
    } else if (u.mobility === 'Horse-drawn' || u.mobility === 'Foot') {
      unitType = 'Infantry'; unitBase = 'Small';
    } else if (GUN_MOB.includes(u.mobility)) {
      unitBase = 'Gun';
      const hasBombard = u.weapons.some(w => w.bombard);
      const atVal = parseInt(main[0]?.at || '');
      if (hasBombard) {
        unitType = 'Artillery';
        // Derive artillery class from converted direct-fire FP
        const artTag = fp === 3 ? 'Heavy Artillery' : fp === 2 ? 'Medium Artillery' : 'Light Artillery';
        if (!notes.includes(artTag)) notes.push(artTag);
      } else if (!isNaN(atVal) && atVal >= 6) { unitType = 'Anti-Tank'; }
      else { unitType = 'Support'; }
    } else if (TANK_MOB.includes(u.mobility) && armorFront === null) {
      unitType = 'Transport'; unitBase = 'Vehicle';
    }

    // For vehicle units: build armament as "Main Gun, Coax MG/Hull MG" etc.
    const isVehicle = unitType === 'Armored' || unitType === 'Transport' || unitType === 'Mechanized';
    let armamentText = null;
    if (isVehicle) {
      const parts = [];
      if (main.length > 0 && main[0].weaponName) parts.push(main[0].weaponName);

      const hasMainGun = main.length > 0;
      const hasCoax = /\bcoax\b/i.test(notesRemainder) || u.weapons.some(w => w.coax);
      const hasHull = /\bhull\s*mg\b/i.test(notesRemainder) || /\bbow\s*mg\b/i.test(notesRemainder) || u.weapons.some(w => w.hull);
      const afterKnownMGs = notesRemainder
        .replace(/\bcoax\s*mg\b/gi, '')
        .replace(/\bhull\s*mg\b/gi, '')
        .replace(/\bbow\s*mg\b/gi, '');
      // Only classify remaining MG as AA MG when there's already a main gun
      const hasOtherMG = hasMainGun && /\bmg\b/i.test(afterKnownMGs);

      const mgParts = [];
      if (hasCoax) mgParts.push('Coax MG');
      if (hasHull) mgParts.push('Hull MG');
      if (hasOtherMG) mgParts.push('AA MG');

      if (mgParts.length > 0) parts.push(mgParts.join('/'));
      else if (!hasMainGun && notesRemainder.length > 1) parts.push(notesRemainder); // MG-only vehicle

      armamentText = parts.length > 0 ? parts.join(', ') : null;
    }

    return {
      id:            makeId(nation, u.unitName),
      name:          u.unitName,
      nation,
      type:          unitType,
      theater:       [],
      years,
      gun_range:     gunRange,
      rof, at, fp,
      armor_front:   armorFront,
      armor_flank:   armorFlank,
      armament:      armamentText,
      notes,
      special_rules: [],
      base:          unitBase,
      standard_platoon: null,
      free:          false,
      wiki:          null,
      lore:          null,
    };
  });

  const json = JSON.stringify(result, null, 2);
  document.getElementById('export-output').textContent = json;
  document.getElementById('output-section').style.display = 'block';
  document.getElementById('export-output').scrollIntoView({ behavior: 'smooth' });
}

function copyExport() {
  navigator.clipboard.writeText(document.getElementById('export-output').textContent).then(() => {
    const btn = document.querySelector('.btn-accent');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy JSON', 1500);
  });
}
</script>
</body>
</html>
